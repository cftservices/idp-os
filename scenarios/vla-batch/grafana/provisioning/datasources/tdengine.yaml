apiVersion: 1

# TDengine datasource for the Vla Batch demo.
# Requires the official TDengine Grafana plugin. Install via env on the Grafana container:
#   GF_INSTALL_PLUGINS=tdengine-datasource
# (plugin id "tdengine-datasource" — TDengine.com official). The plugin talks to
# taosAdapter's REST endpoint on :6041, same host the tdengine-poc/bridge.py writes to.
datasources:
  - name: TDengine
    type: tdengine-datasource
    uid: vla-tdengine
    access: proxy
    # Host = container-naam vla-tdengine (niet 'tdengine'); taosAdapter REST :6041.
    url: http://vla-tdengine:6041
    isDefault: true
    jsonData:
      url: http://vla-tdengine:6041
      user: root
      # database is selected per-query via the super-table name; default db = idp
    secureJsonData:
      # env-interpolatie — echte waarde uit .env TD_PASS (niet in git).
      password: ${TD_PASS}
    editable: true
