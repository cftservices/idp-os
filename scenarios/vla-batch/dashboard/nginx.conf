server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA + API proxy to the batch-engine (single backend -> one secure URL)
  # Dashboard talks ONLY to the batch-engine REST (contract §batch-engine REST).
  location /api/ {
    proxy_pass http://vla-batch-engine:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }
  location / {
    try_files $uri /index.html;
  }
}
