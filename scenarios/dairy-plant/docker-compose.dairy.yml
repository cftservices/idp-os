      monstermq:
        condition: service_healthy
    networks:
      - idp-network

  # ── DAIRY — HTST PASTEURIZER (safety-critical) ────────────────────────────
  packml-dairy-pasteurizer-01:
    build:
      context: ../../packml-sim
      dockerfile: Dockerfile
