      - ../../packml-sim/scenarios:/scenarios:ro
    mem_limit: 96m
    depends_on:
      monstermq:
        condition: service_healthy
    networks:
      - idp-network

  # ── DAIRY — HOMOGENIZER ──────────────────────────────────────────────────
  packml-dairy-homogenizer-01:
