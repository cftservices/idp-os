server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA + API proxy to the mes-engine (single backend → one secure URL)
  location /api/ {
    proxy_pass http://dw-mes-engine:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }
  location / {
    try_files $uri /index.html;
  }
}
