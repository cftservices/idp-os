# DairyWorks — Milk Production Demo scenario overlay (PackML + MQTT direct)
#
# Run (from idp-os root):
#   docker compose -f docker-compose.v3.yml -f scenarios/dairyworks/docker-compose.dairyworks.yml up -d --build
#
# Each unit = one packml-sim container publishing DairyWorks/Plant/<Area>/<Unit>/Status/*
# to MonsterMQ (interne bus). The OPC-UA facade + mes-engine consume/drive via MQTT.

services:

  packml-dw-raw-milk-tank-01:
    build:
      context: ../../packml-sim
      dockerfile: Dockerfile
    image: techflow/packml-sim:latest
    container_name: packml-dw-raw-milk-tank-01
    restart: unless-stopped
    environment:
      UNIT_CONFIG: /scenarios/dairyworks/raw-milk-tank-01.yaml
      MQTT_HOST: monstermq
      MQTT_PORT: "1883"
    volumes:
      - ../../packml-sim/scenarios:/scenarios:ro
    mem_limit: 96m
    depends_on:
      monstermq:
        condition: service_healthy
    networks:
      - idp-network

  packml-dw-buffer-tank-01:
