name: idp

networks:
  idp-network:
    driver: bridge

volumes:
  mongo-data:
  portainer-data:
  monstermq-data:

services:

  # ── TRAEFIK ──────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - idp-network

  # ── PORTAINER ─────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ── MONGODB ───────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - idp-network

  # ── OPC-UA SIMULATOR ──────────────────────────────────
  # Simulates 3 PLCs (PLC_01, PLC_02, PLC_03) with realistic process data.
  # MonsterMQ subscribes to this via OPC-UA client.
  opcua-sim:
    build: ./opcua-simulator
    container_name: opcua-sim
    restart: unless-stopped
    networks:
      - idp-network

  # ── MONSTERMQ ─────────────────────────────────────────
  # Industrial MQTT broker with native OPC-UA client, MongoDB storage backend,
  # flow engine, REST API, GraphQL, and web dashboard.
  monstermq:
    image: rocworks/monstermq:latest
    container_name: monstermq
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./monstermq/config.yaml:/app/config.yaml:ro
      - monstermq-data:/app/data
    depends_on:
      - mongo
      - opcua-sim
    networks:
      - idp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monstermq.rule=Host(`mqtt.${DOMAIN}`)"
      - "traefik.http.routers.monstermq.entrypoints=websecure"
      - "traefik.http.routers.monstermq.tls.certresolver=letsencrypt"
      - "traefik.http.services.monstermq.loadbalancer.server.port=4000"

  # ── INIT OPC-UA (one-shot) ────────────────────────────
  # Registers the 3 OPC-UA PLCs in MonsterMQ via GraphQL mutations.
  # Configs persist in MongoDB — only needs to run once on first deploy.
  init-opcua:
    image: curlimages/curl:latest
    container_name: init-opcua
    restart: "no"
    entrypoint: ["/bin/sh", "/init-opcua.sh"]
    volumes:
      - ./monstermq/init-opcua.sh:/init-opcua.sh:ro
    depends_on:
      monstermq:
        condition: service_healthy
    networks:
      - idp-network

  # ── WEBAPP (Next.js Dashboard) ────────────────────────
  # Live PLC data dashboard: OPC-UA sim → MonsterMQ → MongoDB → Next.js.
  # Queries MongoDB archive collection (plc_data) every 5 seconds.
  webapp:
    build: ./webapp
    container_name: webapp
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
    depends_on:
      - mongo
      - monstermq
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.webapp.entrypoints=websecure"
      - "traefik.http.routers.webapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.webapp.loadbalancer.server.port=3000"
