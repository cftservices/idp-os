name: idp

networks:
  idp-network:
    driver: bridge

volumes:
  mongo-data:
  portainer-data:
  monstermq-data:
  grafana-data:
  neo4j-data:
  n8n-data:

services:

  # ── TRAEFIK ──────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - idp-network

  # ── PORTAINER ─────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ── MONGODB ───────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - idp-network

  # ── OPC-UA SIMULATOR ──────────────────────────────────
  # Simulates 3 PLCs (PLC_01, PLC_02, PLC_03) with realistic process data.
  # MonsterMQ subscribes to this via OPC-UA client.
  opcua-sim:
    build: ./opcua-simulator
    container_name: opcua-sim
    restart: unless-stopped
    networks:
      - idp-network

  # ── MONSTERMQ ─────────────────────────────────────────
  # Industrial MQTT broker with native OPC-UA client, MongoDB storage backend,
  # flow engine, REST API, GraphQL, and web dashboard.
  monstermq:
    image: rocworks/monstermq:latest
    container_name: monstermq
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./monstermq/config.yaml:/app/config.yaml:ro
      - monstermq-data:/app/data
    depends_on:
      - mongo
      - opcua-sim
    networks:
      - idp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monstermq.rule=Host(`mqtt.${DOMAIN}`)"
      - "traefik.http.routers.monstermq.entrypoints=websecure"
      - "traefik.http.routers.monstermq.tls.certresolver=letsencrypt"
      - "traefik.http.services.monstermq.loadbalancer.server.port=4000"

  # ── INIT OPC-UA (one-shot) ────────────────────────────
  # Registers the 3 OPC-UA PLCs in MonsterMQ via GraphQL mutations.
  # Configs persist in MongoDB — only needs to run once on first deploy.
  init-opcua:
    image: curlimages/curl:latest
    container_name: init-opcua
    restart: "no"
    entrypoint: ["/bin/sh", "/init-opcua.sh"]
    volumes:
      - ./monstermq/init-opcua.sh:/init-opcua.sh:ro
    depends_on:
      monstermq:
        condition: service_healthy
    networks:
      - idp-network

  # ── FASTAPI ───────────────────────────────────────────
  # REST API reading from MongoDB. Used by Grafana as JSON datasource.
  fastapi:
    build: ./fastapi
    container_name: fastapi
    restart: unless-stopped
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      API_SECRET_KEY: ${API_SECRET_KEY}
    depends_on:
      - mongo
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=letsencrypt"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"

  # ── GRAFANA ───────────────────────────────────────────
  # Dashboards reading from FastAPI (JSON datasource). Complementary to
  # the Next.js webapp — use for time-series analysis and ad-hoc queries.
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: marcusolsson-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - fastapi
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ── WEBAPP (Next.js Dashboard) ────────────────────────
  # Live PLC data dashboard: OPC-UA sim → MonsterMQ → MongoDB → Next.js.
  # Queries MongoDB archive collection (plc_data) every 5 seconds.
  webapp:
    build: ./webapp
    container_name: webapp
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
    depends_on:
      - mongo
      - monstermq
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.webapp.entrypoints=websecure"
      - "traefik.http.routers.webapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.webapp.loadbalancer.server.port=3000"

  # ── NEO4J ─────────────────────────────────────────────
  # Knowledge graph: asset relationships, P&ID topology, root cause tracing.
  # Step 3b — from ISA-95 hierarchy to connected asset graph.
  # UI: http://localhost:7474  |  Bolt: bolt://localhost:7687
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol (used by FastAPI / Python)
    networks:
      - idp-network

  # ── N8N ───────────────────────────────────────────────
  # Workflow orchestration: interval, event-driven and on-demand pipelines.
  # Step 5 — Orchestrate. Connects MonsterMQ alarms → Teams/email/MongoDB actions.
  # UI: http://localhost:5678
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      DB_TYPE: sqlite
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      - mongo
      - monstermq
    networks:
      - idp-network
