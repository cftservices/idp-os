## RabbitMQ Configuration — IDP Stack v3
## Docs: https://www.rabbitmq.com/configure.html

# ── MQTT Plugin ──────────────────────────────────────────────────────────────
# Allows MQTT devices (PLCs, edge nodes) to connect directly to RabbitMQ.
# MQTT messages are routed to AMQP exchanges via topic mappings.
mqtt.listeners.tcp.default = 1883
mqtt.allow_anonymous        = false
mqtt.vhost                  = /
mqtt.exchange               = amq.topic
mqtt.subscription_ttl       = 1800000
mqtt.prefetch               = 10

# ── Management Plugin ─────────────────────────────────────────────────────────
management.tcp.port = 15672

# ── AMQP Listener ────────────────────────────────────────────────────────────
listeners.tcp.default = 5672

# ── Memory & Disk ────────────────────────────────────────────────────────────
# Conservative limits for VPS deployment
vm_memory_high_watermark.relative = 0.4
disk_free_limit.relative           = 1.5

# ── Logging ──────────────────────────────────────────────────────────────────
log.console             = true
log.console.level       = info
log.file.level          = info
