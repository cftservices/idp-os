# Slim IDP base — minimal shared infra for the DairyWorks / Milk Production Demo.
#
# Only the services the DairyWorks demo needs: Traefik (TLS + one secure URL),
# MongoDB (store), MonsterMQ (MQTT bus + archive), FastAPI (archive API), Grafana.
# The heavy/unused parts of docker-compose.v3.yml (Nifi, Neo4j, RabbitMQ, n8n,
# portainer, webapp, legacy sims) are left out so it fits a ~2 GB VPS.
#
# The packml-sim FACTORY itself (10 units) + mes-engine + opcua-server + dashboard
# come from the overlay. Always run BOTH together:
#
#   docker compose -f docker-compose.slim.yml \
#                  -f scenarios/dairyworks/docker-compose.dairyworks.yml up -d --build
#
# Requires a .env (see scenarios/dairyworks/.env.example).

networks:
  idp-network:
    # Vaste naam (geen project-prefix) — deploy.sh's helper-containers en de
    # docs verwijzen naar 'idp-network', ongeacht de checkout-directorynaam.
    name: idp-network
    driver: bridge

volumes:
  mongo-data:
  grafana-data:
  monstermq-data:

services:

  # ── TRAEFIK (TLS + routing → one secure URL) ─────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - idp-network

  # ── MONGODB (store) ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - idp-network

  # ── MONSTERMQ (MQTT bus + archive → Mongo) ───────────────────────────────
  # Internal MQTT on 1883 (units connect to monstermq:1883). Host 1883 free
  # here (no RabbitMQ in the slim base). HTTP admin/health on 4000.
  monstermq:
    image: rocworks/monstermq:latest
    container_name: monstermq
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./monstermq/config.yaml:/app/config.yaml:ro
      - monstermq-data:/app/data
    depends_on:
      - mongo
    networks:
      - idp-network
    healthcheck:
      # rocworks/monstermq:latest bevat geen wget/curl meer — TCP-check via
      # de shell-ingebouwde /dev/tcp (sh in de image is bash-compatibel).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monstermq.rule=Host(`mqtt.${DOMAIN}`)"
      - "traefik.http.routers.monstermq.entrypoints=websecure"
      - "traefik.http.routers.monstermq.tls.certresolver=letsencrypt"
      - "traefik.http.services.monstermq.loadbalancer.server.port=4000"

  # ── FASTAPI (archive API — /archive/dairyworks/*) ────────────────────────
  fastapi:
    build: ./fastapi
    container_name: fastapi
    restart: unless-stopped
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      API_SECRET_KEY: ${API_SECRET_KEY:-devsecret}
    depends_on:
      - mongo
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=letsencrypt"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"

  # ── GRAFANA (optional visualize) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: marcusolsson-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - fastapi
    networks:
      - idp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
