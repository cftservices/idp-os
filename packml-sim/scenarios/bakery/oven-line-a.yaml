# Bakery line A — 4-zone tunnel oven (DCS-OVEN-A equivalent)
# UNS: bakery-works-utrecht/line-a/baking/tunnel-oven-01/Status/zone-X/temperature
#
# Solve-A demo trigger:
# drift_event below fires 10 minutes after start — zone-3 heater
# degrades by 40%, temp droops, N8N workflow detects + escalates.

type: tunnel-oven
site: bakery-works-utrecht
line: line-a
area: baking
equipment: tunnel-oven-01

publish_interval_s: 1.0
sim_step_s: 0.5

packml:
  mach_design_speed: 120.0
  initial_mach_speed: 90.0    # 90% = 1.35 m/min belt
  transient_duration_s: 8.0
  auto_start: true

physics:
  belt_speed_m_min: 1.5
  thermal_tau_s: 90.0
  zones:
    - { label: "zone-1", setpoint: 240.0 }
    - { label: "zone-2", setpoint: 220.0 }
    - { label: "zone-3", setpoint: 200.0 }   # critical zone for Solve-A
    - { label: "zone-4", setpoint: 180.0 }

  # Solve-A: scheduled drift event on zone-3
  drift_event:
    zone_index: 2          # zero-based → zone-3
    trigger_at_s: 600.0    # 10 min after container start
    magnitude: 0.4
    ramp_s: 120.0
