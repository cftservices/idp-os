# MonsterMQ — Industrial Data Platform v2
TCP: 1883
WSS: 8083
HTTP: 4000

MongoDB:
  Url: "mongodb://admin:changeme@mongo:27017"
  Database: "idp"

DefaultStoreType: MONGODB

Archive:
  Groups:
    - Name: plc_data
      Topics:
        - "idp/#"
      Enabled: true
      RetentionDays: 30
    # Workshop 1 CONNECT — DairyPlant ISA-95 namespace (~18 topics
    # across Receiving / Process / Packaging / CIP / Sensors / Historian).
    # Receives data from BOTH:
    #   - dairy-sim (OPC-UA on port 4841, legacy asyncua sim)
    #   - packml-sim dairy units (direct MQTT publish, PackML-driven)
    - Name: dairy_data
      Topics:
        - "DairyPlant/#"
      Enabled: true
      RetentionDays: 30
    # PackML-driven BakeryWorks Utrecht scenario — direct MQTT publish
    # from packml-sim containers (no OPC-UA hop).
    - Name: bakery_data
      Topics:
        - "bakery-works-utrecht/#"
      Enabled: true
      RetentionDays: 30
    # DairyWorks — Milk Production Demo (generic anonymized batch-dairy).
    # packml-sim units publish DairyWorks/Plant/<Area>/<Unit>/Status/* directly
    # to MonsterMQ; the mes-engine adds Order/HU/Sample/OEE events on the same tree.
    - Name: dairyworks_data
      Topics:
        - "DairyWorks/#"
      Enabled: true
      RetentionDays: 30
    # Vla Batch v2 demo — generic anonymized batch-dairy line 'Vla'.
    # vla-factory (OPC-UA) -> vla-connector -> MonsterMQ publishes
    # DairyWorks/Vla/{Area}/{Equipment}/Status/* + Batch state on the same tree;
    # archived to Mongo collection vla_data and bridged to TDengine.
    - Name: vla_data
      Topics:
        - "DairyWorks/Vla/#"
      Enabled: true
      RetentionDays: 30
